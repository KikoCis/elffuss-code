  <circle cx="84" cy="83" r="5" fill="#ffb3c0" opacity=".55"/>
  <!-- sonrisa -->
  <path d="M56 87 Q 64 94 72 87" fill="none" stroke="#d4826a" stroke-width="3" stroke-linecap="round"/>

    <ellipse cx="53" cy="35.5" rx="7" ry="3.2" transform="rotate(-12 53 35.5)"/>
    <ellipse cx="64" cy="33.5" rx="7" ry="3.2"/>
    <ellipse cx="75" cy="35.5" rx="7" ry="3.2" transform="rotate(12 75 35.5)"/>
    <ellipse cx="86" cy="42" rx="7" ry="3.2" transform="rotate(28 86 42)"/>
  </g>
  <circle cx="64" cy="33.5" r="2.4" fill="#ff4d8d"/>
  <!-- ojos azules -->
